name: Run Cypress Tests

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

# Explicit least-privilege permissions
permissions:
  contents: read

jobs:
  cypress:
    runs-on: ubuntu-latest
    environment: Testing

    strategy:
      fail-fast: false
      matrix:
        category: [01-sdk-core, 02-cards, 03-bank-transfers, 04-alternative-payments, 05-external-3ds]
        # To also run against integ, add: test_env: [sandbox, integ]
        # and pass matrix.test_env as TEST_ENV below.

    env:
      HS_Server_Url: "https://sandbox.hyperswitch.io"
      HS_Client_Url: "http://localhost:9050"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Update git submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: npm install

      # Demo app only needs server/client URLs — Cypress injects keys via URL
      # params when isCypressTestMode=true, so no API credentials are needed here.
      - name: Create demo app .env file
        working-directory: ./Hyperswitch-React-Demo-App
        run: |
          touch .env
          echo "STATIC_DIR=./dist"                        >> .env
          echo "HYPERSWITCH_SERVER_URL=$HS_Server_Url"    >> .env
          echo "HYPERSWITCH_CLIENT_URL=$HS_Client_Url"    >> .env

      # Download the GPG-encrypted connector credentials from S3 and decrypt.
      # The encrypted file is stored in an S3 bucket (not as a GitHub Secret)
      # so that credentials remain encrypted at rest and aren't visible in the
      # GitHub Secrets UI. This mirrors the pattern used by the backend repo.
      - name: Download encrypted creds from S3 and decrypt
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CONNECTOR_CREDS_AWS_ACCESS_KEY_ID }}
          AWS_REGION: ${{ secrets.CONNECTOR_CREDS_AWS_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CONNECTOR_CREDS_AWS_SECRET_ACCESS_KEY }}
          CONNECTOR_AUTH_PASSPHRASE: ${{ secrets.CONNECTOR_AUTH_PASSPHRASE }}
          CONNECTOR_CREDS_S3_BUCKET_URI: ${{ secrets.CONNECTOR_CREDS_S3_BUCKET_URI }}
          S3_SOURCE_FILE_NAME: "68bba6ea-3c75-440f-9c4b-00a30ecbb79d.json.gpg"
        run: |
          mkdir -p cypress-tests
          aws s3 cp "${CONNECTOR_CREDS_S3_BUCKET_URI}/${S3_SOURCE_FILE_NAME}" cypress-tests/creds.json.gpg
          gpg --quiet --batch --yes --decrypt \
              --passphrase="${CONNECTOR_AUTH_PASSPHRASE}" \
              --output cypress-tests/creds.json cypress-tests/creds.json.gpg
          rm cypress-tests/creds.json.gpg

      - name: Build and start local server
        run: |
          npm run re:build && npm run start &
          echo "Hyperswitch Web started"
          cd Hyperswitch-React-Demo-App && npm run start &
          echo "Demo App started"

      - name: Run Cypress Tests (${{ matrix.category }})
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./cypress-tests
          spec: cypress/e2e/${{ matrix.category }}/**/*.cy.ts
        env:
          # Admin API key — used by the before() hook to create a fresh merchant
          # account + connector profiles before each test run.
          CYPRESS_ADMIN_API_KEY: ${{ secrets.CYPRESS_ADMIN_KEY }}

          # Path to the connector credentials file written above.
          CYPRESS_CONNECTOR_AUTH_FILE_PATH: "./creds.json"

          # Target environment (controls which API URL is used).
          TEST_ENV: sandbox
