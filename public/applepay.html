          console.log(clientToken);

          // Step 2: Initialize Braintree client
          braintree.client.create(
            { authorization: clientToken },
            function (clientErr, clientInstance) {
              if (clientErr) {
                console.error(
                  "[ERROR] Failed to create Braintree client:",
                  clientErr
                );
                alert("Client error: " + clientErr.message);
                return;
              }
              console.log("[INFO] Braintree client created successfully");

              // Step 3: Initialize Apple Pay component
              braintree.applePay.create(
                { client: clientInstance },
                function (applePayErr, applePayInstance) {
                  if (applePayErr) {
                    console.error(
                      "[ERROR] Failed to create Apple Pay instance:",
                      applePayErr
                    );
                    alert("Apple Pay error: " + applePayErr.message);
                    return;
                  }
                  console.log("[INFO] Apple Pay instance created");

                  // Step 4: Add click listener to Apple Pay button
                  document
                    .getElementById("apple-pay-button")
                    .addEventListener("click", function () {
                      console.log("[INFO] Apple Pay button clicked");

                      // Step 5: Create Apple Pay payment request
                      const paymentRequest =
                        applePayInstance.createPaymentRequest({
                          total: {
                            label: "My Store",
                            amount: "19.99",
                          },
                          requiredBillingContactFields: ["postalAddress"],
                          // countryCode: 'US',
                          // currencyCode: 'USD',
                          // merchantCapabilities: ['supports3DS'],
                          // supportedNetworks: ['visa', 'masterCard', 'amex', 'discover']
                          supportedNetworks: ["discover"],
                        });

                      console.log(
                        "[INFO] Payment request created:",
                        paymentRequest
                      );

                      // Step 6: Create Apple Pay session
                      const session = new ApplePaySession(3, paymentRequest);

                      // Step 7: Merchant verification
                      session.onvalidatemerchant = function (event) {
                        console.log(
                          "[EVENT] onvalidatemerchant triggered:",
                          event.validationURL
                        );
                        applePayInstance.performValidation(
                          {
                            validationURL: event.validationURL,
                            displayName: "My Store",
                          },
                          function (validationErr, merchantSession) {
                            if (validationErr) {
                              console.error(
                                "[ERROR] Merchant validation failed:",
                                validationErr
                              );
                              alert("Merchant validation error");
                              session.abort();
                              return;
                            }
                            console.log("[INFO] Merchant validation succeeded");
                            session.completeMerchantValidation(merchantSession);
                          }
                        );
                      };

                      // Step 8: Handle payment authorization & get nonce
                      session.onpaymentauthorized = function (event) {
                        console.log(
                          "[EVENT] onpaymentauthorized triggered — attempting tokenization"
                        );

                        applePayInstance.tokenize(
                          {
                            token: event.payment.token,
                          },
                          function (tokenizeErr, payload) {
                            if (tokenizeErr) {
                              console.error(
                                "[ERROR] Tokenization failed:",
                                tokenizeErr
                              );
                              alert(
                                "Tokenization failed: " + tokenizeErr.message
                              );
                              session.completePayment(
                                ApplePaySession.STATUS_FAILURE
                              );
                              return;
                            }

                            // ✅ Tokenization succeeded, nonce received
                            console.log("[SUCCESS] Nonce:", payload.nonce);
                            alert("✅ Apple Pay Nonce: " + payload.nonce);

                            session.completePayment(
                              ApplePaySession.STATUS_SUCCESS
                            );

                            // 🔁 Optional: Send nonce to server for processing
                            fetch("/checkout", {
                              method: "POST",
                              headers: { "Content-Type": "application/json" },
                              body: JSON.stringify({ nonce: payload.nonce }),
                            })
                              .then((res) => res.json())
                              .then((data) => {
                                console.log("[INFO] Server response:", data);
                                alert(
                                  "✅ Payment result: " + JSON.stringify(data)
                                );
                              })
                              .catch((err) => {
                                console.error(
                                  "[ERROR] Error during payment call to server:",
                                  err
                                );
                                alert("❌ Checkout error: " + err.message);
                              });
                          }
                        );
                      };

                      // Step 9: Handle cancellation by user
                      session.oncancel = function () {
                        console.warn(
                          "[CANCELLED] Apple Pay sheet was cancelled by user"
                        );
                      };

                      // Step 10: Start the Apple Pay session
                      session.begin();
                      console.log("[INFO] Apple Pay session started");
                    });
                }
              );
            }
          );
        })
        .catch((err) => {
          console.error("[ERROR] Failed to set up Apple Pay flow:", err);
          alert("Fatal error: " + err.message);
        });
